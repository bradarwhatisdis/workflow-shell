name: workflow-shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: workflow-shell
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          chmod +x scripts/setup.sh
          chmod +x scripts/run.sh
          ./scripts/setup.sh

      - name: Run Workspace Shell
        timeout-minutes: 25
        run: ./scripts/run.sh