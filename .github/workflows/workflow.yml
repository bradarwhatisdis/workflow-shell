name: workflow-shell

on:
  workflow_dispatch:
    inputs:
      enable_login:
        description: 'Enable login authentication'
        type: boolean
        default: false
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: workflow-shell
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          chmod +x scripts/setup.sh
          chmod +x scripts/run.sh
          ./scripts/setup.sh

      - name: Run Workspace Shell
        timeout-minutes: 25
        run: |
          if [ "${{ inputs.enable_login }}" = "true" ]; then
            export USERNAME="${{ secrets.USERNAME }}"
            export PASSWORD="${{ secrets.PASSWORD }}"
          fi
          ./scripts/run.sh