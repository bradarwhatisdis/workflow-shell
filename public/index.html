<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Shell</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <i class="fas fa-terminal topbar-icon"></i>
      <span class="topbar-title">Workflow Shell</span>
    </div>
    <div class="topbar-right">
      <span class="cwd-display" id="cwd-display"><i class="fas fa-folder"></i> /home/runner/work</span>
      <button class="topbar-btn" id="upload-btn" title="Upload file">
        <i class="fas fa-upload"></i>
      </button>
      <button class="topbar-btn" id="new-file-btn" title="New file">
        <i class="fas fa-file-circle-plus"></i>
      </button>
      <button class="topbar-btn" id="new-dir-btn" title="New folder">
        <i class="fas fa-folder-plus"></i>
      </button>
      <button class="topbar-btn" id="refresh-btn" title="Refresh">
        <i class="fas fa-arrows-rotate"></i>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <!-- Left Pane: File Manager -->
    <div class="pane file-pane" id="file-pane">
      <div class="pane-header">
        <i class="fas fa-folder-open"></i>
        <span>Files</span>
      </div>
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item active" data-path="">work</span>
      </div>
      <div class="file-list-container">
        <ul class="file-list" id="file-list"></ul>
      </div>
    </div>

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Right Pane: Terminal -->
    <div class="pane terminal-pane" id="terminal-pane">
      <div class="pane-header">
        <i class="fas fa-terminal"></i>
        <span>Terminal</span>
        <div class="terminal-tabs">
          <span class="tab active" data-session="0">bash</span>
        </div>
      </div>
      <div class="terminal-container" id="terminal-container"></div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-upload"></i> Upload File</h3>
        <button class="modal-close" id="upload-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="dropzone" id="dropzone">
          <i class="fas fa-cloud-arrow-up fa-3x"></i>
          <p>Drag & drop files here or <span class="browse-link">browse</span></p>
          <input type="file" id="file-input" multiple hidden>
        </div>
        <div class="upload-progress" id="upload-progress" style="display:none;">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-text" id="progress-text">Uploading...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Editor Modal -->
  <div class="modal-overlay" id="editor-modal">
    <div class="modal editor-modal">
      <div class="modal-header">
        <h3><i class="fas fa-code"></i> <span id="editor-filename">file.txt</span></h3>
        <div class="modal-header-actions">
          <button class="btn btn-save" id="editor-save"><i class="fas fa-save"></i> Save</button>
          <button class="modal-close" id="editor-modal-close">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div id="editor"></div>
      </div>
    </div>
  </div>

  <!-- New File Modal -->
  <div class="modal-overlay" id="newfile-modal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-file-circle-plus"></i> New File/Folder</h3>
        <button class="modal-close" id="newfile-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Name:</label>
          <input type="text" id="newfile-name" placeholder="filename.txt or folder/">
        </div>
        <div class="form-group">
          <label>Type:</label>
          <select id="newfile-type">
            <option value="file">File</option>
            <option value="directory">Directory</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-close btn btn-cancel">Cancel</button>
        <button class="btn btn-primary" id="newfile-submit">Create</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h3><i class="fas fa-triangle-exclamation"></i> Confirm</h3>
        <button class="modal-close" id="confirm-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirm-text">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button class="modal-close btn btn-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-action">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm-addon-fit/0.7.0/xterm-addon-fit.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-palenight.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/json/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/terminal.js"></script>

</body>
</html>
