<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Shell - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: none;
    }
    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }
    .login-logo {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--text-primary);
      color: var(--bg-primary);
      border-radius: var(--radius-xs);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .login-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
    }
    .login-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 4px;
    }
    .login-card {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 24px 20px;
    }
    .login-card .form-group {
      margin-bottom: 16px;
    }
    .login-card .form-group:last-of-type {
      margin-bottom: 20px;
    }
    .login-card .form-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 5px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .login-card .form-group label i {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .login-card .form-group input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xs);
      color: var(--text-primary);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s var(--ease);
      font-family: var(--font-sans);
    }
    .login-card .form-group input:focus {
      border-color: var(--text-muted);
    }
    .login-card .form-group input::placeholder {
      color: var(--text-muted);
    }
    .login-btn {
      width: 100%;
      padding: 8px 16px;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-xs);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s var(--ease);
      font-family: var(--font-sans);
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:active { opacity: 0.7; }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-error {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--danger-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xs);
      color: var(--danger);
      font-size: 0.82rem;
      margin-bottom: 14px;
    }
    .login-error.visible { display: flex; }
    .login-footer {
      font-size: 0.74rem;
      color: var(--text-muted);
      text-align: center;
    }
    .theme-toggle-login {
      position: fixed;
      top: 12px;
      right: 12px;
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      width: 34px;
      height: 34px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.12s var(--ease);
    }
    .theme-toggle-login:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
  </style>
</head>
<body>

<button class="theme-toggle-login" id="theme-toggle-login" title="Toggle theme">
  <i class="fas fa-sun"></i>
</button>

<div class="login-wrapper">
  <div class="login-logo">WS</div>

  <div>
    <div class="login-title">Workflow Shell</div>
    <div class="login-subtitle">v1.0 &middot; Sign in to access the remote shell</div>
  </div>

  <div class="login-card">
    <div class="login-error" id="login-error">
      <i class="fas fa-circle-exclamation"></i>
      <span id="login-error-text">Invalid credentials</span>
    </div>

    <div class="form-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" id="login-username" placeholder="Enter your username" spellcheck="false" autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="login-submit">
      <i class="fas fa-arrow-right-to-bracket"></i> Sign In
    </button>
  </div>

  <div class="login-footer">
    Session expires after 5 minutes of inactivity
  </div>
</div>

<script>
var existingToken = localStorage.getItem('wfs-session-token');
if (existingToken) {
  window.location.replace('/');
}

var themeBtn = document.getElementById('theme-toggle-login');
var storedTheme = localStorage.getItem('wfs-theme') || 'dark';
document.documentElement.setAttribute('data-theme', storedTheme);
themeBtn.innerHTML = '<i class="fas fa-' + (storedTheme === 'dark' ? 'sun' : 'moon') + '"></i>';

themeBtn.addEventListener('click', function() {
  var theme = document.documentElement.getAttribute('data-theme');
  var newTheme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('wfs-theme', newTheme);
  themeBtn.innerHTML = '<i class="fas fa-' + (newTheme === 'dark' ? 'sun' : 'moon') + '"></i>';
});

var usernameInput = document.getElementById('login-username');
var passwordInput = document.getElementById('login-password');
var submitBtn = document.getElementById('login-submit');
var errorEl = document.getElementById('login-error');
var errorText = document.getElementById('login-error-text');

function showError(msg) {
  errorText.textContent = msg;
  errorEl.classList.add('visible');
}

function hideError() {
  errorEl.classList.remove('visible');
}

function doLogin() {
  var username = usernameInput.value.trim();
  var password = passwordInput.value;
  if (!username || !password) {
    showError('Please enter both username and password');
    return;
  }
  hideError();
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username, password: password }),
  })
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(result) {
      if (result.status === 200 && result.data.token !== undefined) {
        if (result.data.token) {
          localStorage.setItem('wfs-session-token', result.data.token);
          window.location.replace('/?token=' + encodeURIComponent(result.data.token));
        } else {
          window.location.replace('/');
        }
      } else {
        showError(result.data.error || 'Login failed');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
      }
    })
    .catch(function() {
      showError('Network error. Please try again.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
    });
}

submitBtn.addEventListener('click', doLogin);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
