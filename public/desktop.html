<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop - Workflow Shell</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    #vnc-screen { width: 100%; height: 100%; }
    #vnc-screen > div { width: 100%; height: 100%; }
    #vnc-status {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 6px 14px; font-size: 0.8rem;
      background: var(--bg-secondary); color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-sans); z-index: 10;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.connecting { background: #f0ad4e; }
    .status-dot.connected { background: #5cb85c; }
    .status-dot.error { background: #d9534f; }
    .vnc-error {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); text-align: center; gap: 16px; padding: 32px;
    }
    .vnc-error i { font-size: 3rem; opacity: 0.3; }
    .vnc-error h2 { font-size: 1.2rem; font-weight: 500; color: var(--text-primary); }
    .vnc-error p { font-size: 0.9rem; max-width: 400px; line-height: 1.5; }
    #open-tab-btn {
      margin-left: auto; padding: 4px 12px; font-size: 0.78rem;
      background: var(--bg-primary); border: 1px solid var(--border-color);
      border-radius: var(--radius-xs); cursor: pointer; color: var(--text-secondary);
      font-family: var(--font-sans);
    }
    #open-tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  </style>
</head>
<body>
  <div id="vnc-screen"><div class="vnc-error"><i class="fas fa-display"></i><h2>Connecting to Desktop...</h2><p>Please wait while the VNC connection is established.</p></div></div>
  <div id="vnc-status"><span class="status-dot connecting" id="status-dot"></span> <span id="status-text">Initializing...</span></div>

  <script type="module">
    import RFB from '/novnc/core/rfb.js';

    var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var token = localStorage.getItem('wfs-session-token') || '';
    var wsUrl = protocol + '//' + location.host + '/vnc/?token=' + encodeURIComponent(token);

    var dot = document.getElementById('status-dot');
    var statusText = document.getElementById('status-text');
    var screenEl = document.getElementById('vnc-screen');

    function setStatus(state, msg) {
      dot.className = 'status-dot ' + state;
      statusText.textContent = msg;
    }

    try {
      var rfb = new RFB(screenEl, wsUrl, { shared: true });
      rfb.scaleViewport = true;
      rfb.resizeSession = true;

      rfb.addEventListener('connect', function() {
        setStatus('connected', 'Connected to desktop');
      });

      rfb.addEventListener('disconnect', function(e) {
        setStatus('error', 'Disconnected: ' + (e.detail.clean ? 'clean' : 'unexpected'));
      });

      rfb.addEventListener('securityfailure', function(e) {
        setStatus('error', 'Security failure: ' + (e.detail.status || 'unknown'));
        screenEl.innerHTML = '<div class="vnc-error"><i class="fas fa-shield-halved"></i><h2>Connection Failed</h2><p>' + (e.detail.status || 'Security failure') + '</p></div>';
      });
    } catch (e) {
      setStatus('error', 'Failed to initialize VNC client');
      screenEl.innerHTML = '<div class="vnc-error"><i class="fas fa-bug"></i><h2>Initialization Error</h2><p>' + e.message + '</p></div>';
    }
  </script>
</body>
</html>
